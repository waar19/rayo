name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows-build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Test workspace
        run: cargo test --workspace

      - name: Build release binaries
        run: |
          cargo build --release -p rayo-cli
          cargo build --release -p rayo-service
          cargo build --release -p rayo-gui

  powertoys-plugin-scaffold:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build PowerToys plugin
        run: dotnet build .\integrations\powertoys-run\Community.PowerToys.Run.Plugin.Rayo.csproj -c Release

      - name: Publish PowerToys plugin
        run: dotnet publish .\integrations\powertoys-run\Community.PowerToys.Run.Plugin.Rayo.csproj -c Release -o .\dist\powertoys-run\RayoPlugin

      - name: Package PowerToys plugin zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\dist\powertoys-run -Force | Out-Null
          Compress-Archive -Path .\dist\powertoys-run\RayoPlugin\* -DestinationPath .\dist\powertoys-run\RayoPlugin.zip -Force

      - name: Upload PowerToys plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayo-powertoys-plugin
          path: .\dist\powertoys-run\RayoPlugin.zip
