name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Build Windows bundle
        shell: pwsh
        run: .\scripts\release-windows.ps1

      - name: Publish PowerToys plugin
        run: dotnet publish .\integrations\powertoys-run\Community.PowerToys.Run.Plugin.Rayo.csproj -c Release -o .\dist\powertoys-run\RayoPlugin

      - name: Remove PowerToys host DLLs from plugin output
        shell: pwsh
        run: |
          $forbidden = @(
            "Wox.Plugin.dll",
            "Wox.Infrastructure.dll",
            "PowerToys.Common.UI.dll",
            "PowerToys.ManagedCommon.dll",
            "PowerToys.Settings.UI.Lib.dll"
          )
          Get-ChildItem .\dist\powertoys-run\RayoPlugin -Recurse -File |
            Where-Object { $forbidden -contains $_.Name } |
            Remove-Item -Force

      - name: Package PowerToys plugin zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\dist\powertoys-run -Force | Out-Null
          Compress-Archive -Path .\dist\powertoys-run\RayoPlugin\* -DestinationPath .\dist\powertoys-run\RayoPlugin.zip -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Rayo installer EXE
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          .\scripts\build-inno-setup.ps1 -Version $version

      - name: Generate Winget manifest package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $installerUrl = "https://github.com/waar19/rayo/releases/download/${{ github.ref_name }}/RayoSetup.exe"
          .\scripts\generate-winget-manifest.ps1 `
            -Version $version `
            -InstallerUrl $installerUrl `
            -InstallerPath ".\dist\RayoSetup.exe" `
            -InstallerType inno

      - name: Verify plugin zip does not bundle host DLLs
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zipPath = ".\dist\powertoys-run\RayoPlugin.zip"
          $archive = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          try {
            $forbidden = @(
              "Wox.Plugin.dll",
              "Wox.Infrastructure.dll",
              "PowerToys.Common.UI.dll",
              "PowerToys.ManagedCommon.dll",
              "PowerToys.Settings.UI.Lib.dll"
            )
            $badEntries = $archive.Entries | Where-Object {
              $name = [System.IO.Path]::GetFileName($_.FullName)
              $forbidden -contains $name
            }
            if ($badEntries.Count -gt 0) {
              Write-Host "Forbidden host DLLs detected in release zip:"
              $badEntries | ForEach-Object { Write-Host $_.FullName }
              throw "Plugin zip contains host DLLs. Packaging must not include PowerToys/Wox runtime assemblies."
            }
          } finally {
            $archive.Dispose()
          }

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/rayo-windows.zip
            dist/powertoys-run/RayoPlugin.zip
            dist/RayoSetup.exe
            dist/winget/rayo-winget-manifest-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

